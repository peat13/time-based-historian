# ==================================================================================================
# Timebase Infrastructure Stack - Docker Compose
# ==================================================================================================
#
# 🚀 QUICK START:
#   1. Copy example.env to .env (optional - defaults work out of the box!)
#   2. Run: docker-compose up -d
#   3. Access Timebase Explorer at http://localhost:4531
#
# 📚 DOCUMENTATION:
#   - Timebase Docs: https://timebase.flow-software.com/en/knowledge-base
#   - This project: See README.md for detailed setup instructions
#
# 🔧 WHAT'S INCLUDED:
#   - Timebase Historian (port 4511) - Time-series data storage engine
#   - Timebase Explorer (port 4531)  - Web UI for data visualization
#   - Timebase Collector (port 4521) - Data collection service
#
# 💡 ADDING MORE COLLECTORS:
#   See the commented collector-2 example below - just uncomment and customize!
#
# ==================================================================================================

# ==================================================================================================
# 🎯 EXTENSION TEMPLATES
# ==================================================================================================
# These are reusable templates that make it easy to add multiple collectors.
# They are not services themselves - think of them as blueprints.
# ==================================================================================================

x-collector-template: &collector-template
  image: timebase/collector:${COLLECTOR_TAG:-latest}
  restart: unless-stopped
  environment:
    Settings: /collector/settings
    Config: /collector/config
    Data: /collector/data
    Logs: /collector/logs
  networks:
    - timebase-network
  depends_on:
    - timebase-historian
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

# ==================================================================================================
# 🐳 SERVICES
# ==================================================================================================

services:

  # ------------------------------------------------------------------------------------------------
  # Timebase Historian - Core time-series database
  # ------------------------------------------------------------------------------------------------
  # This is the heart of the system. All data flows through the Historian.
  # Must be running before Collector and Explorer can connect.
  # ------------------------------------------------------------------------------------------------
  timebase-historian:
    image: timebase/historian:${HISTORIAN_TAG:-latest}
    container_name: ${HISTORIAN_CONTAINER_NAME:-historian}
    hostname: ${HISTORIAN_HOSTNAME:-historian}
    restart: unless-stopped

    ports:
      - "${HISTORIAN_PORT:-4511}:4511"

    environment:
      Settings: /historian/settings
      Data: /historian/data
      Logs: /historian/logs

    volumes:
      - historian-data:/historian

    networks:
      - timebase-network

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ------------------------------------------------------------------------------------------------
  # Timebase Explorer - Web-based UI
  # ------------------------------------------------------------------------------------------------
  # The web interface for visualizing and analyzing your time-series data.
  # Access it at http://localhost:4531 after starting the stack.
  # ------------------------------------------------------------------------------------------------
  timebase-explorer:
    image: timebase/explorer:${EXPLORER_TAG:-latest}
    container_name: ${EXPLORER_CONTAINER_NAME:-explorer}
    hostname: ${EXPLORER_HOSTNAME:-explorer}
    restart: unless-stopped

    ports:
      - "${EXPLORER_PORT:-4531}:4531"

    environment:
      Settings: /explorer/settings
      Config: /explorer/config
      Data: /explorer/data
      Logs: /explorer/logs
      HISTORIAN_HOST: ${HISTORIAN_HOSTNAME:-historian}

    volumes:
      - explorer-data:/explorer

    networks:
      - timebase-network

    depends_on:
      - timebase-historian

    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /explorer/config
        cat > /explorer/config/sources.config <<EOF
        {
          "Historians": {
            "Local": {
              "Name": "Local",
              "Host": "${HISTORIAN_HOSTNAME:-historian}",
              "Port": 4511,
              "UseTls": false,
              "Auth": {
                "Enabled": false,
                "IdP": {
                  "Host": "localhost",
                  "Port": 4542,
                  "UseTls": true
                },
                "ClientId": "",
                "ClientSecret": ""
              }
            }
          }
        }
        EOF
        exec dotnet Timebase.Explorer.UI.dll

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ------------------------------------------------------------------------------------------------
  # Timebase Collector 01 - Data collection service
  # ------------------------------------------------------------------------------------------------
  # Collectors gather data from various sources and send it to the Historian.
  # This uses the x-collector-template defined above for easy duplication.
  # ------------------------------------------------------------------------------------------------
  timebase-collector-01:
    <<: *collector-template
    container_name: ${COLLECTOR_01_CONTAINER_NAME:-collector-01}
    hostname: ${COLLECTOR_01_HOSTNAME:-collector-01}
    environment:
      Active: ${COLLECTOR_01_ACTIVE:-false}
      Settings: /collector/settings
      Config: /collector/config
      Data: /collector/data
      Logs: /collector/logs
    ports:
      - "${COLLECTOR_01_PORT:-4521}:4521"
    volumes:
      - collector-01-data:/collector

  # ------------------------------------------------------------------------------------------------
  # 💡 EXAMPLE: Adding a second collector
  # ------------------------------------------------------------------------------------------------
  # Uncomment the lines below to add a second collector.
  # Customize the environment variables in example.env if needed.
  # ------------------------------------------------------------------------------------------------
  timebase-collector-02:
    <<: *collector-template
    container_name: ${COLLECTOR_02_CONTAINER_NAME:-collector-02}
    hostname: ${COLLECTOR_02_HOSTNAME:-collector-02}
    environment:
      Active: ${COLLECTOR_02_ACTIVE:-false}
      Settings: /collector/settings
      Config: /collector/config
      Data: /collector/data
      Logs: /collector/logs
    ports:
      - "${COLLECTOR_02_PORT:-4522}:4521"
    volumes:
      - collector-02-data:/collector

  # ------------------------------------------------------------------------------------------------
  # 💡 EXAMPLE: Adding a third collector
  # ------------------------------------------------------------------------------------------------
  # timebase-collector-03:
  #   <<: *collector-template
  #   container_name: ${COLLECTOR_03_CONTAINER_NAME:-collector-03}
  #   hostname: ${COLLECTOR_03_HOSTNAME:-collector-03}
  #   environment:
  #     Active: ${COLLECTOR_03_ACTIVE:-false}
  #     Settings: /collector/settings
  #     Config: /collector/config
  #     Data: /collector/data
  #     Logs: /collector/logs
  #   ports:
  #     - "${COLLECTOR_03_PORT:-4523}:4521"
  #   volumes:
  #     - collector-03-data:/collector


# ==================================================================================================
# 💾 VOLUMES
# ==================================================================================================
# Named volumes for persistent data storage.
# Your data is stored here even when containers are recreated.
#
# 📍 FINDING YOUR DATA:
#   - List volumes: docker volume ls
#   - Inspect volume: docker volume inspect timebase-historian-data
#   - Location: Usually /var/lib/docker/volumes/ on Linux
#
# 🗑️  REMOVING DATA:
#   - docker-compose down -v (⚠️  deletes all data!)
#   - docker volume rm timebase-historian-data (specific volume)
# ==================================================================================================

volumes:
  historian-data:
    name: ${HISTORIAN_VOLUME_NAME:-timebase-historian-data}

  collector-01-data:
    name: ${COLLECTOR_01_VOLUME_NAME:-timebase-collector-01-data}

  # Uncomment these if you add collector-02 and collector-03
  collector-02-data:
    name: ${COLLECTOR_02_VOLUME_NAME:-timebase-collector-02-data}
  # collector-03-data:
  #   name: ${COLLECTOR_03_VOLUME_NAME:-timebase-collector-03-data}

  explorer-data:
    name: ${EXPLORER_VOLUME_NAME:-timebase-explorer-data}

# ==================================================================================================
# 🌐 NETWORK
# ==================================================================================================
# All services communicate through this network using their hostnames.
# Example: Collector connects to Historian using "http://historian:4511"
# ==================================================================================================

networks:
  timebase-network:
    name: ${NETWORK_NAME:-timebase-network}
    driver: bridge

# ==================================================================================================
# 🎓 NEXT STEPS
# ==================================================================================================
#
# 1. START THE STACK:
#    docker-compose up -d
#
# 2. CHECK STATUS:
#    docker-compose ps
#
# 3. VIEW LOGS:
#    docker-compose logs -f                    # All services
#    docker-compose logs -f timebase-historian # Specific service
#
# 4. ACCESS SERVICES:
#    - Timebase Explorer: http://localhost:4531
#    - Historian API: http://localhost:4511
#    - Collector API: http://localhost:4521
#
# 5. STOP THE STACK:
#    docker-compose down                       # Stop and remove containers
#    docker-compose down -v                    # Also remove volumes (⚠️  deletes data!)
#
# 6. UPDATE IMAGES:
#    docker-compose pull                       # Download latest images
#    docker-compose up -d                      # Recreate containers with new images
#
# ==================================================================================================
# Need help? Check out:
# - README.md in this repository
# - https://timebase.flow-software.com/en/knowledge-base
# - https://docs.docker.com/compose/
# ==================================================================================================
